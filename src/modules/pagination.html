<nav
  th:fragment="pagination(prevUrl,nextUrl,totalPages,page,hasPrevious,hasNext)"
  class="hydro-pagination"
  th:if="${hasPrevious || hasNext}"
>
  <a th:if="${hasPrevious}" th:href="@{${prevUrl}}">上一页</a>
  <span th:text="|${page} / ${totalPages}|">1 / 1</span>
  <a th:if="${hasNext}" th:href="@{${nextUrl}}">下一页</a>
</nav>
