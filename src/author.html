<include src="layout.html">
  <template name="head">
    <title th:text="|${author.spec.displayName} - ${site.title}|">作者</title>
  </template>

  <th:block
    th:with="eyebrow='Author', title=${author.spec.displayName}, description=${author.spec.bio}"
    th:replace="~{modules/list-hero}"
  />

  <section class="hydro-list-section">
    <div class="hydro-container">
      <div class="hydro-list-grid" th:if="${posts.total gt 0}">
        <th:block th:each="post,stat : ${posts.items}">
          <th:block th:replace="~{modules/post-card :: post-card(${post},${stat.index})}" />
        </th:block>
      </div>
      <div th:if="${posts.total == 0}" class="hydro-empty">这位作者还没有文章。</div>
      <th:block
        th:replace="~{modules/pagination :: pagination(${posts.prevUrl},${posts.nextUrl},${posts.totalPages},${posts.page},${posts.hasPrevious()},${posts.hasNext()})}"
      />
    </div>
  </section>
</include>
