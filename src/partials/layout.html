<!doctype html>
<html
  th:lang="${#locale.toLanguageTag}"
  th:attr="data-theme-default=${theme.config.style.color_scheme ?: 'auto'}"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <include src="base-head.html" />
    <slot name="head">
      <title th:text="${site.title}">Hydro-Minim</title>
    </slot>
  </head>
  <body
    class="hydro-page"
    th:style="|--hydro-light-bg:${theme.config.style.background_color ?: '#F3F3F3'}; --hydro-dark-bg:${theme.config.style.dark_background_color ?: '#101112'}; --hydro-coral:${theme.config.style.accent_color ?: '#FF6B6B'};|"
    th:attr="data-smooth-scroll=${theme.config.style.smooth_scroll},data-enable-motion=${theme.config.style.enable_motion}"
  >
    <div th:if="${theme.config.style.grain}" class="grain-overlay" aria-hidden="true"></div>

    <th:block th:replace="~{modules/header}" />

    <main class="tilt-on-scroll" style="transform-style: preserve-3d">
      <slot />
    </main>

    <th:block th:replace="~{modules/footer}" />

    <!-- FAB + 返回顶部 -->
    <div class="hydro-fab-group" aria-label="快捷操作">
      <!-- FAB 快捷项（仅在启用时渲染） -->
      <div th:if="${theme.config.fab.enabled}" class="hydro-fab-menu" data-hydro-fab>
        <div class="hydro-fab-items">
          <th:block th:each="item : ${theme.config.fab.items}">
            <a
              class="hydro-fab-item"
              th:href="${item.url}"
              th:target="${item.new_tab ? '_blank' : '_self'}"
              th:attr="aria-label=${item.label},title=${item.label}"
              rel="noopener noreferrer"
            >
              <th:block th:utext="${item.icon}" />
            </a>
          </th:block>
        </div>
        <button class="hydro-fab-trigger" data-hydro-fab-trigger aria-label="快捷操作" aria-expanded="false">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
      </div>
      <!-- 返回顶部 -->
      <button class="hydro-back-to-top" data-hydro-back-to-top aria-label="返回顶部" title="返回顶部">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <polyline points="18 15 12 9 6 15" />
        </svg>
      </button>
    </div>

    <halo:footer />
  </body>
</html>
