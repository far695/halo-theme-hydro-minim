<include src="layout.html">
  <template name="head">
    <title th:text="|瞬间 - ${site.title}|">瞬间</title>
  </template>

  <section
    class="hydro-moments-page"
    th:with="allMoments=${momentFinder.list({size: 1})},allMomentTotal=${allMoments.total ?: moments.total ?: 0}"
  >
    <div class="hydro-container">
      <header class="hydro-moments-hero">
        <div class="hydro-moments-hero__copy">
          <p>Hydro-Minim / Moments</p>
          <h1>瞬间</h1>
          <span>像朋友圈一样记录正在发生的碎片：图片、视频、声音、音乐和一句短短的心情。</span>
        </div>
        <dl class="hydro-moments-hero__meta" th:if="${moments != null}">
          <div>
            <dt>Total</dt>
            <dd th:text="${moments.total ?: 0}">0</dd>
          </div>
          <div>
            <dt>Page</dt>
            <dd th:text="|${moments.page ?: 1}/${moments.totalPages ?: 1}|">1/1</dd>
          </div>
        </dl>
      </header>

      <nav class="hydro-moments-tags" th:if="${not #lists.isEmpty(tags)}" aria-label="瞬间标签">
        <a th:href="@{/moments}" th:classappend="${#lists.isEmpty(param.tag)} ? 'is-active' : ''">
          <span>全部</span>
          <sup th:text="${allMomentTotal}">0</sup>
        </a>
        <a
          th:each="tag : ${tags}"
          th:href="|/moments?tag=${tag.name}|"
          th:classappend="${#lists.contains(param.tag, tag.name)} ? 'is-active' : ''"
        >
          <span th:text="${tag.name}">标签</span>
          <sup th:text="${tag.momentCount ?: 0}">0</sup>
        </a>
      </nav>

      <div class="hydro-moments-feed" th:if="${not #lists.isEmpty(moments.items)}">
        <article
          class="hydro-moment"
          th:each="moment,stat : ${moments.items}"
          th:with="content=${moment.spec.content}"
          th:style="|--moment-order: ${stat.index};|"
          data-moment
        >
          <aside class="hydro-moment__rail" aria-hidden="true">
            <time th:text="${#dates.format(moment.spec.releaseTime, 'MM.dd')}">01.15</time>
            <span></span>
          </aside>

          <div class="hydro-moment__card">
            <header class="hydro-moment__header">
              <div class="hydro-moment__author" th:if="${moment.owner != null}">
                <img
                  th:if="${moment.owner.avatar != null}"
                  th:src="${moment.owner.avatar}"
                  th:alt="${moment.owner.displayName}"
                  loading="lazy"
                />
                <span th:text="${moment.owner.displayName}">Hydro</span>
              </div>
              <time
                th:datetime="${moment.spec.releaseTime}"
                th:text="${#dates.format(moment.spec.releaseTime, 'yyyy.MM.dd HH:mm')}"
              >
                2024.01.15 12:00
              </time>
            </header>

            <div
              class="hydro-moment__content hydro-prose"
              th:if="${not #strings.isEmpty(content.html)}"
              th:utext="${content.html}"
            ></div>

            <div class="hydro-moment__media" th:if="${not #lists.isEmpty(content.medium)}">
              <div
                class="hydro-moment__photos"
                th:classappend="${#lists.size(content.medium) == 1 ? 'is-single' : (
                  #lists.size(content.medium) == 2 ? 'is-double' : '')}"
              >
                <button
                  class="hydro-moment__photo"
                  th:each="media : ${content.medium}"
                  th:if="${media.type.name == 'PHOTO'}"
                  th:attr="data-src=${media.url},data-alt='瞬间图片'"
                  data-lightbox-trigger
                >
                  <img th:src="${media.url}" alt="瞬间图片" loading="lazy" />
                </button>
              </div>

              <div class="hydro-moment__attachments">
                <figure
                  class="hydro-moment__video"
                  th:each="media : ${content.medium}"
                  th:if="${media.type.name == 'VIDEO'}"
                >
                  <video th:src="${media.url}" controls preload="metadata"></video>
                  <figcaption>Video</figcaption>
                </figure>

                <figure
                  class="hydro-moment__audio"
                  th:each="media : ${content.medium}"
                  th:if="${media.type.name == 'AUDIO'}"
                >
                  <span aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                      <path d="M9 18V5l10-2v13"></path>
                      <circle cx="6" cy="18" r="3"></circle>
                      <circle cx="16" cy="16" r="3"></circle>
                    </svg>
                  </span>
                  <figcaption>Audio</figcaption>
                  <audio th:src="${media.url}" controls></audio>
                </figure>
              </div>
            </div>

            <footer class="hydro-moment__footer">
              <div class="hydro-moment__tags" th:if="${not #lists.isEmpty(moment.spec.tags)}">
                <a th:each="tag : ${moment.spec.tags}" th:href="|/moments?tag=${tag}|">
                  <span>#</span>
                  <b th:text="${tag}">tag</b>
                </a>
              </div>
              <div class="hydro-moment__actions">
                <button
                  class="hydro-moment__action hydro-moment__upvote"
                  type="button"
                  th:attr="data-moment-upvote=${moment.metadata.name},aria-label=|点赞 ${moment.metadata.name}|"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z"
                    ></path>
                  </svg>
                  <span th:attr="data-upvote-moment-name=${moment.metadata.name}" th:text="${moment.stats.upvote ?: 0}"
                    >0</span
                  >
                </button>
                <button
                  class="hydro-moment__action"
                  type="button"
                  th:attr="data-moment-comment-toggle=${moment.metadata.name},aria-expanded='false',aria-controls=|moment-comment-${moment.metadata.name}|"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4Z"></path>
                  </svg>
                  <span th:text="${moment.stats.approvedComment ?: 0}">0</span>
                </button>
                <a class="hydro-moment__action hydro-moment__permalink" th:href="|/moments/${moment.metadata.name}|">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M7 17 17 7M9 7h8v8"></path>
                  </svg>
                  <span>查看瞬间</span>
                </a>
              </div>
            </footer>
            <div
              class="hydro-moment__comment"
              hidden
              th:id="|moment-comment-${moment.metadata.name}|"
              th:attr="data-moment-comment=${moment.metadata.name}"
            >
              <halo:comment group="moment.halo.run" kind="Moment" th:attr="name=${moment.metadata.name}" />
            </div>
          </div>
        </article>
      </div>

      <div th:if="${#lists.isEmpty(moments.items)}" class="hydro-empty">暂无瞬间。</div>

      <nav class="hydro-pagination" th:if="${moments.hasPrevious || moments.hasNext}">
        <a th:if="${moments.hasPrevious}" th:href="@{${moments.prevUrl}}">上一页</a>
        <span th:text="|${moments.page} / ${moments.totalPages}|">1 / 1</span>
        <a th:if="${moments.hasNext}" th:href="@{${moments.nextUrl}}">下一页</a>
      </nav>
    </div>
  </section>

  <div class="hydro-lightbox" data-lightbox aria-hidden="true">
    <button class="hydro-lightbox__close" data-lightbox-close aria-label="关闭">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"></path></svg>
    </button>
    <button class="hydro-lightbox__prev" data-lightbox-prev aria-label="上一张">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18 9 12l6-6"></path></svg>
    </button>
    <img class="hydro-lightbox__img" data-lightbox-img src="" alt="" />
    <button class="hydro-lightbox__next" data-lightbox-next aria-label="下一张">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18l6-6-6-6"></path></svg>
    </button>
    <div class="hydro-lightbox__counter" data-lightbox-counter></div>
  </div>
</include>
