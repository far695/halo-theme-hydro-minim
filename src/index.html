<include src="layout.html">
  <template
    name="head"
    th:with="
      homeConfig=${theme.config.home},
      showHero=${homeConfig == null or (homeConfig.show_hero != false and homeConfig.show_hero != 'false')}
    "
  >
    <title th:text="|${site.title} - Hydro-Minim|">Hydro-Minim</title>
    <link
      th:if="${showHero}"
      rel="preload"
      th:href="${theme.config.home?.hero_cover ?: #theme.assets('/images/hero-featured.jpg')}"
      as="image"
    />
  </template>

  <div
    class="hydro-home"
    th:with="
      homeConfig=${theme.config.home},
      showHero=${homeConfig == null or (homeConfig.show_hero != false and homeConfig.show_hero != 'false')},
      showLatest=${homeConfig == null or (homeConfig.show_latest != false and homeConfig.show_latest != 'false')},
      showCategories=${homeConfig == null or (homeConfig.show_categories != false and homeConfig.show_categories != 'false')},
      showAbout=${homeConfig == null or (homeConfig.show_about != false and homeConfig.show_about != 'false')}
    "
    th:classappend="${showHero} ? '' : ' hydro-home--without-hero'"
  >
    <th:block th:if="${showHero}">
      <th:block th:replace="~{modules/hero}" />
    </th:block>
    <th:block th:if="${showLatest}">
      <th:block th:replace="~{modules/latest-articles}" />
    </th:block>
    <th:block th:if="${showCategories}">
      <th:block th:replace="~{modules/categories-showcase}" />
    </th:block>
    <th:block th:if="${showAbout}">
      <th:block th:replace="~{modules/about}" />
    </th:block>
  </div>
</include>
