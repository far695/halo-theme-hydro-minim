<include src="layout.html">
  <template name="head">
    <title th:text="|${theme.config.plugins?.product?.title ?: (title ?: '产品商城')} - ${site.title}|">产品商城</title>
  </template>

  <section class="hydro-list-hero">
    <div class="hydro-container">
      <p th:text="${theme.config.plugins?.product?.eyebrow ?: 'Hydro-Minim / Store'}">Hydro-Minim / Store</p>
      <h1 th:text="${theme.config.plugins?.product?.title ?: (title ?: '产品商城')}">产品商城</h1>
      <span
        th:text="${theme.config.plugins?.product?.description ?: '浏览授权产品、实物商品和卡密商品，查看价格、库存和购买入口。'}"
      >
        浏览授权产品、实物商品和卡密商品，查看价格、库存和购买入口。
      </span>
    </div>
  </section>

  <section
    class="hydro-plugin-page hydro-product-page"
    th:with="
      hasProductPlugin=${pluginFinder.available('PluginProduct')},
      pageBaseUrl=${'/product'},
      currentKeyword=${param.keyword != null and not #lists.isEmpty(param.keyword) ? param.keyword[0] : null},
      currentType=${param.type != null and not #lists.isEmpty(param.type) ? param.type[0] : null},
      currentCategoryId=${param.categoryId != null and not #lists.isEmpty(param.categoryId) ? param.categoryId[0] : null},
      currentRefcode=${param.refcode != null and not #lists.isEmpty(param.refcode) ? param.refcode[0] : null},
      currentPageText=${param.page != null and not #lists.isEmpty(param.page) ? #strings.trim(param.page[0]) : '1'},
      currentPageRaw=${currentPageText.matches('^[0-9]{1,4}$') ? T(java.lang.Integer).parseInt(currentPageText) : 1},
      currentPage=${currentPageRaw < 1 ? 1 : currentPageRaw},
      productPageSizeText=${theme.config.plugins?.product?.page_size == null ? '' : #strings.trim('' + theme.config.plugins.product.page_size)},
      productPageSizeRaw=${productPageSizeText.matches('^[0-9]{1,3}$') ? T(java.lang.Integer).parseInt(productPageSizeText) : 12},
      productPageSize=${productPageSizeRaw < 1 ? 12 : productPageSizeRaw},
      showProductCategoryFilter=${theme.config.plugins?.product == null or theme.config.plugins.product.show_category_filter != false},
      productScope=${currentType == 'LICENSE' ? 'license' : ((currentType == 'PHYSICAL' or currentType == 'CARD_KEY') ? 'mall' : 'all')},
      productTypeFilter=${(currentType == 'PHYSICAL' or currentType == 'CARD_KEY') ? currentType : ''},
      productsData=${hasProductPlugin and themeProductFinder != null ? themeProductFinder.list(productScope, productTypeFilter, currentKeyword, currentCategoryId, currentPage, productPageSize) : null},
      hasProductsData=${productsData != null and productsData.items != null and not #lists.isEmpty(productsData.items)},
      hasActiveFilter=${not #strings.isEmpty(currentKeyword) or not #strings.isEmpty(currentType) or not #strings.isEmpty(currentCategoryId)}"
  >
    <div class="hydro-container">
      <div class="hydro-plugin-notice" th:if="${not hasProductPlugin}">
        <strong>需要安装产品管理插件</strong>
        <span class="hydro-plugin-notice__body">
          需要安装并启用 PluginProduct。安装后发布产品，这里会展示商城列表、筛选和产品详情入口。
        </span>
        <a
          class="hydro-plugin-install-link"
          href="https://auth.muyin.site/product/PluginProduct"
          target="_blank"
          rel="noreferrer noopener"
          >查看插件</a
        >
      </div>

      <form
        class="hydro-portfolio-filter hydro-product-filter"
        th:if="${hasProductPlugin}"
        th:action="@{/product}"
        method="get"
      >
        <label>
          <span>关键词</span>
          <input type="search" name="keyword" th:value="${currentKeyword}" placeholder="产品名称、描述或 key" />
        </label>
        <label>
          <span>类型</span>
          <select name="type">
            <option value="" th:selected="${#strings.isEmpty(currentType)}">全部产品</option>
            <option value="LICENSE" th:selected="${currentType == 'LICENSE'}">授权产品</option>
            <option value="PHYSICAL" th:selected="${currentType == 'PHYSICAL'}">实物商品</option>
            <option value="CARD_KEY" th:selected="${currentType == 'CARD_KEY'}">卡密商品</option>
          </select>
        </label>
        <label th:if="${showProductCategoryFilter}">
          <span>分类</span>
          <select
            name="categoryId"
            data-hydro-product-category-select
            th:attr="data-api-token=${publicApiToken ?: ''},data-current-category-id=${currentCategoryId ?: ''}"
          >
            <option value="" th:selected="${#strings.isEmpty(currentCategoryId)}">全部分类</option>
            <option
              th:if="${not #strings.isEmpty(currentCategoryId)}"
              th:value="${currentCategoryId}"
              th:selected="true"
              th:text="${currentCategoryId}"
            >
              当前分类
            </option>
          </select>
        </label>
        <input
          th:if="${not #strings.isEmpty(currentRefcode)}"
          type="hidden"
          name="refcode"
          th:value="${currentRefcode}"
        />
        <button type="submit">筛选</button>
        <a th:if="${hasActiveFilter}" class="hydro-portfolio-filter__reset" th:href="@{/product}">重置</a>
      </form>

      <div th:if="${hasProductsData}" class="hydro-portfolio-grid hydro-product-grid">
        <article
          class="hydro-portfolio-card hydro-product-card"
          th:each="product,productStat : ${productsData.items}"
          th:with="
            typeName=${product.productType == null ? '' : product.productType.name()},
            typeLabel=${typeName == 'LICENSE' ? '授权产品' : (typeName == 'PHYSICAL' ? '实物商品' : (typeName == 'CARD_KEY' ? '卡密商品' : '产品'))},
            stockLabel=${product.stockState == 'SOLD_OUT' ? '已售罄' : (product.stockState == 'AVAILABLE' ? '有库存' : (product.stockState == 'UNLIMITED' ? '不限库存' : (product.stockState == 'UNKNOWN' ? '库存同步中' : '数字交付')))},
            detailHref=${#strings.isEmpty(product.detailUrl) ? '/product/' + product.key : product.detailUrl}"
        >
          <span class="hydro-portfolio-card__index" th:text="${#numbers.formatInteger(productStat.index + 1, 2)}"
            >01</span
          >
          <span class="hydro-portfolio-card__status" th:text="${stockLabel}">可购买</span>
          <a
            class="hydro-portfolio-card__media hydro-product-card__media"
            th:href="@{${detailHref}}"
            th:attr="data-media-error-text=${product.name ?: '产品图片暂时不可见'}"
            data-hydro-product-link
            data-progressive-media
          >
            <img
              th:if="${not #strings.isEmpty(product.logo)}"
              th:src="${product.logo}"
              th:alt="${product.name}"
              loading="lazy"
              decoding="async"
              data-progressive-image
            />
            <span th:if="${#strings.isEmpty(product.logo)}" class="hydro-plugin-placeholder">PRODUCT</span>
          </a>

          <div class="hydro-portfolio-card__body">
            <div class="hydro-portfolio-card__meta">
              <span class="hydro-portfolio-chip" th:text="${typeLabel}">授权产品</span>
              <span class="hydro-portfolio-chip hydro-portfolio-chip--accent" th:text="${product.displayPrice}"
                >¥0.00</span
              >
            </div>
            <h2 class="hydro-portfolio-card__title">
              <a th:href="@{${detailHref}}" data-hydro-product-link th:text="${product.name}">产品名称</a>
            </h2>
            <div class="hydro-portfolio-card__spec">
              <span th:if="${not #strings.isEmpty(product.author)}" th:text="${product.author}">作者</span>
              <span th:if="${not #strings.isEmpty(product.latestVersion)}" th:text="|v${product.latestVersion}|"
                >v1.0.0</span
              >
              <span th:if="${not #strings.isEmpty(product.categoryId)}" th:text="|#${product.categoryId}|"
                >#category</span
              >
            </div>
            <div
              class="hydro-portfolio-card__summary hydro-product-card__summary"
              th:if="${not #strings.isEmpty(product.description)}"
              th:utext="${product.description}"
            >
              产品描述
            </div>
          </div>

          <div class="hydro-portfolio-card__footer">
            <a th:href="@{${detailHref}}" data-hydro-product-link>详情</a>
            <a
              th:if="${product.purchasable == true and not #strings.isEmpty(product.purchaseUrl)}"
              th:href="@{${product.purchaseUrl}}"
              data-hydro-product-link
              th:text="${typeName == 'LICENSE' ? '购买' : '立即购买'}"
              >立即购买</a
            >
            <a
              th:if="${not #strings.isEmpty(product.docsUrl)}"
              th:href="@{${product.docsUrl}}"
              target="_blank"
              rel="noreferrer noopener"
              >文档</a
            >
          </div>
        </article>
      </div>

      <div th:if="${hasProductPlugin and not hasProductsData}" class="hydro-plugin-empty">
        <span>Store</span>
        <strong>暂无公开产品</strong>
        <p>产品管理插件已可用。发布授权产品、实物商品或卡密商品后，这里会展示商品卡片和购买入口。</p>
      </div>

      <nav
        class="hydro-pagination"
        th:if="${productsData != null and (productsData.hasPrevious() or productsData.hasNext())}"
      >
        <a
          th:if="${productsData.hasPrevious()}"
          th:href="@{${pageBaseUrl}(page=${productsData.page - 1},keyword=${currentKeyword},type=${currentType},categoryId=${currentCategoryId},refcode=${currentRefcode})}"
          th:text="${theme.config.navigation?.pagination?.previous_label ?: '上一页'}"
          >上一页</a
        >
        <span th:text="|${productsData.page} / ${productsData.totalPages}|">1 / 1</span>
        <a
          th:if="${productsData.hasNext()}"
          th:href="@{${pageBaseUrl}(page=${productsData.page + 1},keyword=${currentKeyword},type=${currentType},categoryId=${currentCategoryId},refcode=${currentRefcode})}"
          th:text="${theme.config.navigation?.pagination?.next_label ?: '下一页'}"
          >下一页</a
        >
      </nav>
    </div>
  </section>
</include>
